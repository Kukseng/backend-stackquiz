name: Backend CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      # Postgres 
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: stackquiz-user
          POSTGRES_PASSWORD: stackquiz@123
          POSTGRES_DB: stackquiz-db
        ports:
          - 5432:5432
        #  health check
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis
      redis:
        image: redis:7
        ports:
          - 6379:6379
        # health check
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache Gradle dependencies
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Make Gradle wrapper executable
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Wait for services to be healthy (optional but recommended)
      - name: Wait for services
        run: |
          # Wait a bit for services to fully start
          sleep 10

      # Build & Test
      - name: Build & Test
        run: |
          ./gradlew clean test
          ./gradlew bootJar --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/stackquiz-db
          SPRING_DATASOURCE_USERNAME: stackquiz-user
          SPRING_DATASOURCE_PASSWORD: stackquiz@123
          REDIS_HOST: localhost  # Fixed: Use localhost instead of redis
          REDIS_PORT: 6379

      # Build Docker Image
      - name: Build Docker image
        run: docker build -t stackquiz-backend:latest .

      # Push Docker Image to DockerHub
      - name: Push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag stackquiz-backend:latest ${{ secrets.DOCKER_USERNAME }}/stackquiz-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/stackquiz-backend:latest


      - name: Log out of Docker
        if: always()
        run: docker logout